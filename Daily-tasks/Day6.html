    <script>
        //Q1 Check if  arry is palindrome 
        function fun1() {
            let str = [1, 2, 3];
            let start = [];
            let end = [];
            for (let i = 0; i < str.length; i++) {
                start.push(str[i]);
            }
            for (let j = str.length - 1; j >= 0; j--) {
                end.push(str[j]);
            }
            if (start.toString() === end.toString()) {
                console.log("The array is palindrome");
            }
            else {
                console.log("The array is not palindrome");
            }
        }
        fun1();

        // way Two solve this problem
        function val(pail) {
            let str = 0
            let end = pail.length - 1
            while (str < end) {
                if (pail[str] !== pail[end]) {
                    return false;
                }
                str++
                end--
            }
            return true;
        }
        console.log(val([1, 2, 3, 4]))
        console.log(val([1, 2, 1]))
