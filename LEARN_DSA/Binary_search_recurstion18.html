<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Recursion</title>
    <script>
        function parent () {
            let arry = [1,3,8,33,37,41];
            let start = 0;
            let end = arry.length-1;
            let position = undefined;
            const find = parseInt(document.getElementById("sur").value);
            function show(arry,start,end){
                mid = Math.floor((start+end)/2);
                if(arry[mid] == find){
                    position = mid;
                    return true;
                }
                else if (arry[mid]>find){
                show(arry,start,mid-1)
                }
                else{
                show(arry,mid+1,end)
            }
        }
        show(arry,0,arry.length-1);
        console.log(position+1);
    }
        </script>
</head>
<body>
    <h1>This is Binary Search Recursion Example</h1>
    <p>my challenge is add inputs button to find value</p>
    <input type="text" placeholder="enter here search number here" id="sur">
    <button onclick="parent()">clik</button>
</body>
</html>
