<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertion Sort</title>
    <script>
        let surajdata = [12, 11, 23, 5, 34, 2, 7,15,9];
        let total = surajdata.length;
        let current = undefined;
        function calls(fir, sec, third){
            let i, j;
            for(i=1 ; i<sec; i++){
                third = fir[i];
                j = i-1;
                while(j>=0 & fir[j] < third){
                    fir[j+1] = fir[j]
                    j--;
                }
                fir[j+1] = third;
            }
        }
        calls(surajdata,total,current);
        console.log(surajdata);

    </script>
</head>

<body>
    <h1>Insertion Sort Array Example</h1>
</body>

</html>
