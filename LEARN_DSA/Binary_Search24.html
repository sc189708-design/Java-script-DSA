        class Data {
            constructor(val) {
                this.vlaue = val;
                this.left = null;
                this.right = null;
            }
        }

        class Call {
            constructor() {
                this.root = null
            }
            back() {
                return this.root == null
            }
            addval(valu) {
                let nodevalue = new Data(valu);
                if (this.root == null) {
                    this.root = nodevalue;
                }
                else {
                    this.thrid(this.root, nodevalue);
                }
            }
            thrid(root, nodeval) {
                if (root.vlaue > nodeval.vlaue) {
                    if (root.left == null) {
                        root.left = nodeval
                    }
                    else {
                        this.thrid(root.left, nodeval);
                    }
                }
                else {
                    if (root.right == null) {
                        root.right = nodeval;
                    } else {
                        this.thrid(root.right, nodeval)
                    }
                }
            }

            // the function of the serach ....
            search(root, val) {
                if (root == null) {
                    return false;
                } else if (root.vlaue == val) {
                    return true;
                } else if (root.vlaue > val) {
                    return this.search(root.left, val)
                }
                else {
                    return this.search(root.right, val)
                }
            }

            //dept First search  Preorder
            preorder(root) {
                if (root) {
                    //console.log(root.vlaue)
                    this.preorder(root.left)
                    this.preorder(root.right)
                }
            }

            // this is example of the inorder
            inorder(root) {
                if (root) {
                    this.inorder(root.left)
                    // console.log(root.vlaue)
                    this.inorder(root.right)
                }
            }

            //this exampel of the postorder
            postorder(root) {
                if (root) {
                    this.postorder(root.left);
                    this.postorder(root.right);
                    console.log(root.vlaue)
                }
            }

            //this is exampel of the Breath first search
            breath() {
                let data = [];
                data.push(this.root)
                while (data.length) {
                    let nowdata = data.shift()
                    if (nowdata.left) {
                        data.push(nowdata.left)
                    }
                    if (nowdata.right) {
                        data.push(nowdata.right)
                    }
                    console.log(nowdata.vlaue)
                }
            }

            // this is min vlaue example
            minval(root) {
                if (!root.left) {
                    return root.vlaue
                }
                else {
                    return this.minval(root.left)
                }
            }
            maxval(root) {
                if (!root.right) {
                    return root.vlaue
                }
                else {
                    return this.maxval(root.right)
                }
            }

            // exaple of the Delete node...

            thedel(val){
                this.root = this.deldata(this.root, val)
            }

            deldata(root, val){
                if(root == null){
                    return null;
                }
                if(val<root.vlaue){
                    root.left = this.deldata(root.left, val)
                }
                else if(val> root.vlaue){
                    root.right = this.deldata(root.right, val)
                }
                else{
                    if(!root.left && !root.right){
                        return null;
                    }
                    else if(!this.left){
                        return this.right;
                    }
                    else if(!this.right){
                        return this.left;
                    }
                    this.vlaue = this.minval(root.right);
                    root.right = this.deldata(root.right,val)
                }
                return root;
            }
