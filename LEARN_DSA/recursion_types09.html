<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursion Types</title>
    <script>
        let money = 100;
        let prodect = 0;
        function totalmoney(rupes){
            if(rupes>0){
                console.log('You have total', rupes,'Rs. and we have total', prodect ,'apple')
                buys(rupes)
            }
            else{
                console.log('You have total', rupes,'Rs. and we have total', prodect ,'apple')
            }
        }
        function buys(rupes){
           if(rupes>=0){
            prodect++
            rupes = rupes-10
            totalmoney(rupes)
           }
        }

        totalmoney(money)
    </script>
</head>

<body>
    <h1>This is the Recursion Types Example</h1>
</body>

</html>
