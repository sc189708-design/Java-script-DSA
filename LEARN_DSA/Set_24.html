<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <script>
        let myset = new Set(['suraj', 'surja', 'kaka' , 'raman', 'suraj']);
        myset.add('superman');
        myset.add('spiderman');
        myset.delete('surja')
        for(let key of myset){
            console.log(key);
        }
        myset.forEach((value)=>{
            console.log(value);
        })
        console.log(myset.size);
    </script>
</head>
<body>

</body>
