<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Implementation</title>

    <script>
        // Queue example
        let thevlaue = [];
        let tottalvlaue = thevlaue.length;
        let maxmum = 5;

        function once(val) {
            const elu = parseInt(document.getElementById("theval").value)
            if (tottalvlaue >= maxmum) {
                alert('the value is max out sir')
            }
            else {
                thevlaue[tottalvlaue] = elu;
                tottalvlaue++
            }
            document.getElementById("theval").value = "";
        }

        function del() {
            if (!isall()) {
                for (let i = 0; i < thevlaue.length; i++) {
                    thevlaue[i] = thevlaue[i + 1]
                    thevlaue.length = tottalvlaue
                    tottalvlaue--
                }
            } else {
                alert('the array length is already empty')
            }
        }

        function first() {
            if (!isall()) {
                tottalvlaue = thevlaue[0]
                console.log(tottalvlaue)
            }
            else {
                alert('the value is empty')
            }
        }

        function last() {
            if (!isall()) {
                tottalvlaue = thevlaue[tottalvlaue-1]
                console.log(tottalvlaue)
            }
            else {
                alert('the value is empty')
            }
        }

        function dis() {
            console.log(thevlaue)
        }

        function isall(){
            if(tottalvlaue >= 0){
                return false;
            }
            else{
                return true;
            }
        }

    </script>

</head>

<body>
    <h1>Queue Implementation with JavaScript</h1>
    <input type="text" id="theval" placeholder="add-vlaue">
    <button onclick="once()">addValue</button>
    <button onclick="del()">deleteValue</button>
    <button onclick="first()">first vlaue</button>
    <button onclick="last()">lastvalue</button>
    <button onclick="dis()">showdispay</button>

</body>

</html>
