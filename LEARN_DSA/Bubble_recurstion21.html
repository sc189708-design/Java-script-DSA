<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble sort</title>
    <script>
        let data = [23, 33, 12, 11, 45, 7, 9, 17]
        let len = data.length;
        console.log('this is onrignal value data:', data)
        function callback(arr, seclen) {
            if (seclen == 1) {
                return;
            }

            for (let i = 0; i < seclen; i++) {
                if (arr[i] > arr[i + 1]) {
                    let tem = arr[i]
                    arr[i] = arr[i + 1]
                    arr[i + 1] = tem;
                }
            }
          callback(arr, seclen-1);
        }
        callback(data, len);
        console.log('after change', data)
    </script>
</head>

<body>
    <h1>Example of Bubble Sort</h1>
</body>

</html>
