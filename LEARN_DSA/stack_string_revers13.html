<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stack string revers</title>
    <script>

        let arry = [];
        let totalvalue = arry.length;

        function push(val) {
            arry[totalvalue] = val
            totalvalue += 1;
        }

        function pop() {
            lastremove = arry[totalvalue - 1]
            totalvalue -= 1
            arry.length = totalvalue;
            return lastremove;
        }
        function reversh(item) {
            for (let i = 0; i <= item.length - 1; i++) {
                push(item[i])
            }
            for (let i = 0; i <= item.length - 1; i++) {
                item[i] = pop()
            }
        }
        push(35)
        push(33)
        console.log(arry);
        
        let str = "suraj chandel"
        str = str.split("")
        reversh(str)
        console.log(str.join(''))

    </script>
</head>

<body>
    <h1>In this part we are going to reverse a string using stack</h1>
</body>

</html>
