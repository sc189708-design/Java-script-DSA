<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arry travarsing</title>

    <script>
        let data = [9, 4, 6, 8, 99, 45, 33, 555, 21, 11, 23, 45, 60];
        //click button show arrys
        function suraj() {
            const btn = document.getElementById('click')
            btn.addEventListener('click', function () {
                for (let i = 0; i < data.length; i++) {
                    document.write(`arry ${i} is ${data[i]} <br>`)
                }
            })
        }
        //max value
        function bhai() {
            const max = document.getElementById("maxout");
            max.addEventListener('click', function () {
                let max = 0;
                for (let i=0; i<data.length; i++) {
                    if(data[i]>max){
                        max = data[i]
                    }
                }
                document.write(max)
            })
        }
        function ser() {
            const num = document.getElementById("val").value
            if (num < data.length && typeof parseInt(num) === "number" && num >= 0) {
                alert(data[num])
            } else {
                alert('plase check value this is not verfiy')
            }
        }
    </script>
</head>

<body>
    <!-- challenge one click button and prin all arrys -->
    <div>
        <p>click here to print arrays <button onclick="suraj()" id="click">click me</button></p>
        <p>check max value of this arry <button onclick="bhai()" id="maxout">max</button></p>
        <input type="text" id="val"><button id="en" onclick="ser()"> serach arry</button>
    </div>
</body>

</html>
