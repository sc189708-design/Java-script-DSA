        // let fan = 7;

        function suraj(){
            function valu(val){
                if(val == 0){
                    return 1 ;
                }
                return val*valu(val-1)
            }
            const val = parseInt(document.getElementById('btn').value)
            document.write(`The factorial number of ${ val} = ${ valu(val)}`);
            console.log(valu(val));
        }

    </script>
</head>

<body>
    <h1>recursion</h1>
    <h2>which number you need a factorial number </h2>
    <input type="text" id="btn" placeholder="enter here factorial number">
    <button onclick="suraj()" id="su">click</button>
</body>
