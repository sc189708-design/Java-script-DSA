    <script>
        let val1 = [1, 3, 5, 8, 11, 13, 15, 16, 35, 33, 35];
        let val2 = [2, 4, 6, 7, 9, 10, 12, 14];
        let res = [];
        let v1 = 0;
        let v2 = 0;
        let v3 = 0;
        while (v1 < val1.length && v2 < val2.length) {
            if (val1[v1] < val2[v2]) {
                res[v3] = val1[v1]
                v1++
            }
            else {
                res[v3] = val2[v2]
                v2++
            }
            v3++;
        }
        while (v1 < val1.length) {
            res[v3] = val1[v1]
            v1++
            v3++
        }

        console.log(res);
