        //challenge 1: Circular Queue without total variable

        class call { 

            constructor(re) {
                this.max = re;
                this.value = new Array(re);
                this.front = -1;
                this.rear = -1;
            }

            addvalue (val) {
                if(this.front == (this.rear + 1) % this.max){
                    console.log('the value is full aready')
                }
                    if(this.front == -1){
                        this.front = 0;
                        this.rear = 0;
                    }
                    else{
                        this.rear = (this.rear +1) % this.max;
                    }
                    this.value[this.rear] = val;    
            }

            del(){
                if(this.max != 0){
                    this.value[this.front]= null;
                    if(this.front == this.max -1){
                        this.front = 0
                    }
                    else {
                        this.front++
                    }
                }
                else{
                    this.front = -1;
                    this.rear = -1;
                    alert('the vlue is empty sir')
                }
            }

        }
        let re = new call(3)
        re.addvalue(31);
        re.addvalue(21);
        re.addvalue(11);
        re.del()
        re.del()
        re.del()
        re.addvalue(7)
        re.addvalue(17)
        re.addvalue(27)
        console.log(re.value);
