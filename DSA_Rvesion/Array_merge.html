<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Merge</title>
    <script>
        let v1 = [2, 3, 4, 5, 6, 7];
        let v2 = [22, 33, 44, 55];
        let total = [];
        for (i = 0; i < v1.length; i++) {
            total[i] = v1[i]
            for (s = 0; s < v2.length; s++) {
                total[v1.length + s] = v2[s]
            }
        }
        console.log(total)

        // in this part i marge two array use while loop;
        let a1 = [1,3,7,9,11,15,17,18];
        let a2 = [2,5,8,13,16];
        let a3 = [];
        let s1 = 0;
        let s2 = 0;
        let s3 = 0;
        while(s1<a1.length && s2<a2.length){
            if(a1[s1] < a2[s2]){
                a3[s3] = a1[s1];
                s1++
            }
            else{
                a3[s3] = a2[s2];
                s2++
            }
            s3++
        }
        while(s1<a1.length){
            a3[s3] = a1[s1]
            s1++
            s3++
        }
        console.log(a3)
    </script>
</head>

<body>
    <div>
        <h1> in this part i solve a one problem and mege to arrays</h1>
    </div>
</body>

</html>
