        // palindrome vlaue
        function call() {
            let val = 'suraj';
            let result = true;
            let left = 0;
            let right = val.length-1;
            while(left<right){
                if(val[left] !== val[right]){
                    result = false;
                    break;
                }
                left++
                right--
            }
            if(result){
                console.log('the vlaue is Palindrome')
            }
            else{
                console.log('the value is not a Palindrome')
            }
        }
